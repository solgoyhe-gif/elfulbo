document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

          <!-- match list -->\n          <div style=\"margin:0 20px;display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ mobileMatches }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div sc-camel-on-click=\"{{ m.onSelect }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:10px;background:#12172B;border:1px solid {{ m.rowBorder }};border-radius:14px;padding:12px 13px;\">\n                <span style=\"font:700 10px 'Space Grotesk';color:{{ m.stateColor }};width:34px;flex-shrink:0;\">{{ m.stateMain }}<\u002Fspan>\n                <div style=\"flex:1;display:flex;flex-direction:column;gap:7px;\">\n                  <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:22px;height:22px;border-radius:50%;background:{{ m.home.flag }};box-shadow:0 0 0 1px rgba(255,255,255,0.12);\"><\u002Fspan><span style=\"font:600 13px 'Archivo';color:#EEF1F8;flex:1;\">{{ m.home.name }}<\u002Fspan><span style=\"font:700 15px 'Space Grotesk';color:#fff;\">{{ m.hsTxt }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:22px;height:22px;border-radius:50%;background:{{ m.away.flag }};box-shadow:0 0 0 1px rgba(255,255,255,0.12);\"><\u002Fspan><span style=\"font:600 13px 'Archivo';color:#EEF1F8;flex:1;\">{{ m.away.name }}<\u002Fspan><span style=\"font:700 15px 'Space Grotesk';color:#fff;\">{{ m.asTxt }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- top scorers mini -->\n          <div style=\"margin:18px 20px 90px;background:#12172B;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:15px;\">\n            <div style=\"font:600 11px 'Space Grotesk';letter-spacing:.08em;text-transform:uppercase;color:#8A92AD;margin-bottom:12px;\">Máximos goleadores<\u002Fdiv>\n            <sc-for list=\"{{ scorers }}\" as=\"p\" hint-placeholder-count=\"3\">\n && e.stopPropagation) e.stopPropagation(); this.setState(s => ({ favorites: { ...s.favorites, [i]: !s.favorites[i] } })); }\n  onQueryChange(e) { this.setState({ query: e.target.value }); }\n  toggleNotif(e) { if (e && e.stopPropagation) e.stopPropagation(); this.setState(s => ({ notifOpen: !s.notifOpen })); }\n  setMobileSeg(v) { this.setState({ mobileSeg: v }); }\n\n  renderVals() {\n    const gradA = 'linear-gradient(135deg,#3D6FFF,#8B5CF6)';\n    const F = {\n      ARG: 'linear-gradient(180deg,#75AADB 0 33%,#fff 33% 66%,#75AADB 66%)',\n      BRA: 'radial-gradient(circle at 50% 55%, #FFDF00 26%, #009B3A 26%)',\n      FRA: 'linear-gradient(90deg,#0055A4 33%,#fff 33% 66%,#EF4135 66%)',\n      GER: 'linear-gradient(180deg,#141414 33%,#DD0000 33% 66%,#FFCE00 66%)',\n      USA: 'linear-gradient(135deg,#3C3B6E 42%,#B22234 42%)',\n      MEX: 'linear-gradient(90deg,#006847 33%,#fff 33% 66%,#CE1126 66%)',\n      ESP: 'linear-gradient(180deg,#AA151B 25%,#F1BF00 25% 75%,#AA151B 75%)',\n      ITA: 'linear-gradient(90deg,#008C45 33%,#fff 33% 66%,#CD212A 66%)',\n      JPN: 'radial-gradient(circle,#BC002D 28%,#fff 28%)',\n      CRO: 'linear-gradient(180deg,#FF0000 38%,#fff 38% 62%,#171796 62%)',\n      RSA: 'linear-gradient(120deg,#007749 45%,#FFB915 45% 55%,#001489 55%)',\n      KOR: 'radial-gradient(circle,#CD2E3A 30%,#0047A0 30% 44%,#fff 44%)',\n      MAR: 'radial-gradient(circle,#006233 24%,#C1272D 24%)',\n      SCO: 'linear-gradient(135deg,#0065BF 45%,#fff 45% 55%,#0065BF 55%)',\n      NGA: 'linear-gradient(90deg,#008751 33%,#fff 33% 66%,#008751 66%)',\n      AUS: 'linear-gradient(135deg,#00247D 55%,#fff 55% 62%,#E4002B 62%)',\n      TUN: 'radial-gradient(circle,#fff 26%,#E70013 26%)',\n      POL: 'linear-gradient(180deg,#fff 50%,#DC143C 50%)',\n      ENG: 'linear-gradient(#CE1124,#CE1124) center/100% 26% no-repeat, linear-gradient(#CE1124,#CE1124) center/26% 100% no-repeat, #fff',\n      POR: 'linear-gradient(90deg,#006600 40%,#FF0000 40%)',\n      NED: 'linear-gradient(180deg,#AE1C28 33%,#fff 33% 66%,#21468B 66%)',\n    };\n    const T = (code, name) => ({ code, name, flag: F[code] });\n\n    const matches = [\n      { cat: 'live', state: 'LIVE', min: \"78'\", group: 'Grupo C', home: T('ARG', 'Argentina'), away: T('BRA', 'Brasil'), hs: 2, as: 2 },\n      { cat: 'live', state: 'LIVE', min: \"65'\", group: 'Grupo D', home: T('FRA', 'Francia'), away: T('GER', 'Alemania'), hs: 1, as: 0 },\n      { cat: 'live', state: 'HT', min: 'DESC.', group: 'Grupo A', home: T('USA', 'EE.UU.'), away: T('MEX', 'México'), hs: 0, as: 0 },\n      { cat: 'upcoming', state: '20:00', min: '', group: 'Grupo B', home: T('ESP', 'España'), away: T('ITA', 'Italia'), hs: null, as: null },\n      { cat: 'upcoming', state: '23:00', min: '', group: 'Grupo C', home: T('JPN', 'Japón'), away: T('CRO', 'Croacia'), hs: null, as: null },\n      { cat: 'finished', state: 'FT', min: 'Final', group: 'Grupo A', home: T('RSA', 'Sudáfrica'), away: T('KOR', 'Corea'), hs: 1, as: 2 },\n      { cat: 'finished', state: 'FT', min: 'Final', group: 'Grupo B', home: T('MAR', 'Marruecos'), away: T('SCO', 'Escocia'), hs: 2, as: 0 },\n    ];\n\n    const favorites = this.state.favorites;\n    const selected = this.state.selected;\n    const dm = (m, i) => ({\n      ...m,\n      index: i,\n      favorite: !!favorites[i],\n      isSelected: i === selected,\n      onSelect: () => this.selectMatch(i),\n      onToggleFav: (e) => this.toggleFav(i, e),\n      stateMain: m.cat === 'live' ? (m.state === 'HT' ? 'DESC.' : m.min) : m.state,\n      stateColor: m.cat === 'live' ? (m.state === 'HT' ? '#F5C33B' : '#FF4D6D') : (m.cat === 'finished' ? '#8A92AD' : '#7C8BB0'),\n      dotAnim: m.state === 'LIVE' ? 'animation:pulseDot 1.2s infinite;' : '',\n      score: m.hs == null ? 'VS' : (m.hs + ' – ' + m.as),\n      scoreColor: m.hs == null ? '#7C8BB0' : '#fff',\n      hsTxt: m.hs == null ? '–' : String(m.hs),\n      asTxt: m.as == null ? '–' : String(m.as),\n      rowBg: i === selected ? 'rgba(61,111,255,0.10)' : (m.cat === 'live' ? 'rgba(255,77,109,0.05)' : 'rgba(255,255,255,0.02)'),\n      rowBorder: i === selected ? 'rgba(61,111,255,0.5)' : (m.cat === 'live' ? 'rgba(255,77,109,0.18)' : 'rgba(255,255,255,0.05)'),\n      starColor: favorites[i] ? '#F5C33B' : (m.cat === 'live' ? '#7C8BB0' : '#3a445f'),\n    });\n    const matchesWithMeta = matches.map((m, i) => dm(m, i));\n\n    const tab = this.state.tab;\n    const navView = this.state.navView;\n    const query = this.state.query;\n    const count = (c) => matches.filter(m => m.cat === c).length;\n    const tabsDef = [\n      ['all', 'Todos', matches.length],\n      ['live', 'En vivo', count('live')],\n      ['upcoming', 'Próximos', count('upcoming')],\n      ['finished', 'Finalizados', count('finished')],\n    ];\n    const tabs = tabsDef.map(([key, label, c]) => {\n      const active = tab === key;\n      return {\n        key, label, count: c, active,\n        bg: active ? gradA : 'transparent',\n        color: active ? '#fff' : '#8A92AD',\n        countBg: active ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.06)',\n        countColor: active ? '#fff' : '#8A92AD',\n        onClick: () => this.setTab(key),\n      };\n    });\n    let base = navView === 'favoritos' ? matchesWithMeta.filter(m => m.favorite) : matchesWithMeta;\n    base = tab === 'all' ? base : base.filter(m => m.cat === tab);\n    if (query.trim()) {\n      const q = query.trim().toLowerCase();\n      base = base.filter(m => (m.home.name + ' ' + m.away.name).toLowerCase().includes(q));\n    }\n    const filtered = base;\n    const noResults = filtered.length === 0;\n\n    const mkGroup = (name, rows) => ({\n      name,\n      teams: rows.map((r, i) => ({\n        pos: i + 1,\n        posColor: i < 2 ? '#2FD98B' : '#6a728c',\n        name: r[1], flag: F[r[0]], pj: r[2], pts: r[3],\n      })),\n    });\n    const groups = [\n      mkGroup('Grupo A', [['MEX', 'México', 2, 4], ['USA', 'EE.UU.', 2, 4], ['RSA', 'Sudáfrica', 2, 3], ['KOR', 'Corea', 2, 0]]),\n      mkGroup('Grupo B', [['ESP', 'España', 2, 6], ['ITA', 'Italia', 2, 3], ['MAR', 'Marruecos', 2, 3], ['SCO', 'Escocia', 2, 0]]),\n      mkGroup('Grupo C', [['BRA', 'Brasil', 2, 6], ['ARG', 'Argentina', 2, 4], ['CRO', 'Croacia', 2, 1], ['JPN', 'Japón', 2, 1]]),\n      mkGroup('Grupo D', [['FRA', 'Francia', 2, 6], ['GER', 'Alemania', 2, 3], ['NGA', 'Nigeria', 2, 3], ['AUS', 'Australia', 2, 0]]),\n    ];\n    const groups2 = [groups[2], groups[3]];\n\n    const scorers = [\n      { rank: 1, name: 'K. Mbappé', team: 'Francia', flag: F.FRA, goals: 5 },\n      { rank: 2, name: 'L. Messi', team: 'Argentina', flag: F.ARG, goals: 4 },\n      { rank: 3, name: 'R. Lewandowski', team: 'Polonia', flag: F.POL, goals: 4 },\n      { rank: 4, name: 'Vinícius Jr', team: 'Brasil', flag: F.BRA, goals: 3 },\n      { rank: 5, name: 'H. Kane', team: 'Inglaterra', flag: F.ENG, goals: 3 },\n    ].map(p => ({ ...p, rankColor: p.rank === 1 ? '#F5C33B' : (p.rank <= 3 ? '#8B5CF6' : '#6a728c') }));\n\n    const ev = (min, type, player) => {\n      const map = {\n        goal: { bg: gradA, radius: '50%', label: 'Gol' },\n        yellow: { bg: '#F5C33B', radius: '3px', label: 'T. Amarilla' },\n        red: { bg: '#FF4D6D', radius: '3px', label: 'T. Roja' },\n        sub: { bg: '#4D7CFF', radius: '50%', label: 'Cambio' },\n      }[type];\n      return { min, player, bg: map.bg, radius: map.radius, label: map.label };\n    };\n    const stat = (home, away, label, hpct, apct) => ({ home, away, label, hpct, apct });\n    const goal = (min, player) => ({ min, player });\n\n    // Per-match detail data (events/stats/goal-chips), keyed by match index.\n    const matchDetails = {\n      0: {\n        events: [ev(\"23'\", 'goal', 'Messi'), ev(\"38'\", 'yellow', 'Casemiro'), ev(\"45'\", 'goal', 'Neymar'), ev(\"64'\", 'goal', 'Álvarez'), ev(\"77'\", 'goal', 'Vinícius'), ev(\"81'\", 'sub', 'Di María')],\n        stats: [stat('52%', '48%', 'Posesión', 52, 48), stat('14', '11', 'Tiros', 56, 44), stat('5', '4', 'A puerta', 55, 45), stat('4', '3', 'Córners', 57, 43), stat('8', '9', 'Faltas', 47, 53)],\n        homeGoals: [goal(\"23'\", 'Messi'), goal(\"64'\", 'Álvarez')],\n        awayGoals: [goal(\"45'\", 'Neymar'), goal(\"77'\", 'Vinícius')],\n      },\n      1: {\n        events: [ev(\"12'\", 'yellow', 'Rüdiger'), ev(\"55'\", 'goal', 'Mbappé'), ev(\"60'\", 'sub', 'Musiala')],\n        stats: [stat('47%', '53%', 'Posesión', 47, 53), stat('9', '13', 'Tiros', 41, 59), stat('4', '6', 'A puerta', 40, 60), stat('3', '5', 'Córners', 38, 62), stat('10', '7', 'Faltas', 59, 41)],\n        homeGoals: [goal(\"55'\", 'Mbappé')],\n        awayGoals: [],\n      },\n      2: {\n        events: [],\n        stats: [stat('49%', '51%', 'Posesión', 49, 51), stat('4', '5', 'Tiros', 44, 56), stat('1', '2', 'A puerta', 40, 60), stat('2', '1', 'Córners', 60, 40), stat('3', '4', 'Faltas', 43, 57)],\n        homeGoals: [],\n        awayGoals: [],\n      },\n    };\n    const detail = matchDetails[selected] || { events: [], stats: null, homeGoals: [], awayGoals: [] };\n    const events = detail.events;\n    const stats = detail.stats;\n    const hasEvents = events.length > 0;\n    const noEvents = !hasEvents;\n    const hasStats = !!stats;\n    const noStats = !hasStats;\n\n    const news = [\n      { tag: 'OFICIAL', title: 'Publicado el calendario oficial del Mundial 2026', time: 'hace 2 h', tagColor: '#7C6BFF', tagBg: 'rgba(124,107,255,0.16)' },\n      { tag: 'SELECCIÓN', title: 'Messi: \"Venimos a defender nuestro título\"', time: 'hace 5 h', tagColor: '#2FD98B', tagBg: 'rgba(47,217,139,0.14)' },\n      { tag: 'LESIÓN', title: 'Francia recupera a Mbappé para los octavos', time: 'hace 8 h', tagColor: '#FF4D6D', tagBg: 'rgba(255,77,109,0.14)' },\n    ];\n\n    const upcoming = [\n      { time: '20:00', home: T('ESP', 'España'), away: T('ITA', 'Italia') },\n      { time: '23:00', home: T('JPN', 'Japón'), away: T('CRO', 'Croacia') },\n      { time: 'Mañ.', home: T('POR', 'Portugal'), away: T('NED', 'Países Bajos') },\n    ];\n\n    const navItems = [\n      { key: 'inicio', label: 'Inicio' },\n      { key: 'envivo', label: 'En Vivo', badge: String(count('live')) },\n      { key: 'proximos', label: 'Próximos' },\n      { key: 'mundial', label: 'Mundial 2026', badge: 'HOT' },\n      { key: 'grupos', label: 'Grupos' },\n      { key: 'equipos', label: 'Equipos' },\n      { key: 'jugadores', label: 'Jugadores' },\n      { key: 'goleadores', label: 'Goleadores' },\n      { key: 'noticias', label: 'Noticias' },\n      { key: 'estadisticas', label: 'Estadísticas' },\n      { key: 'favoritos', label: 'Favoritos' },\n    ];\n    const nav = navItems.map(n => {\n      const active = navView === n.key;\n      return {\n        label: n.label,\n        bg: active ? gradA : 'transparent',\n        color: active ? '#fff' : '#9aa3bd',\n        dot: active ? 'rgba(255,255,255,0.35)' : '#2a3350',\n        badge: n.badge || '',\n        badgeBg: !n.badge ? 'transparent' : (n.badge === 'HOT' ? '#FF4D6D' : (active ? 'rgba(255,255,255,0.25)' : '#8B5CF6')),\n        onClick: () => this.setNavView(n.key),\n      };\n    });\n\n    // section visibility driven by sidebar navigation\n    const showHero = ['inicio', 'mundial', 'estadisticas', 'envivo', 'favoritos', 'proximos'].includes(navView);\n    const showMatchList = !['grupos', 'noticias', 'goleadores', 'jugadores'].includes(navView);\n    const showGroups = ['inicio', 'mundial', 'grupos', 'equipos'].includes(navView);\n    const showLineups = (navView === 'inicio' || navView === 'mundial') && selected === 0;\n    const showNews = ['inicio', 'mundial', 'noticias'].includes(navView);\n\n    // ---- hero (bound to the selected match) ----\n    const selMatch = matchesWithMeta[selected];\n    const isLive = selMatch.cat === 'live';\n    const isFinished = selMatch.cat === 'finished';\n    let badgeLabel, badgeColor, badgeBg, badgeBorder, badgeDot, badgeAnim, stateLine, stateColor, ctaLabel;\n    if (isLive) {\n      const ht = selMatch.state === 'HT';\n      badgeLabel = ht ? 'DESCANSO' : 'EN VIVO';\n      badgeColor = ht ? '#F5C33B' : '#FF7D95';\n      badgeBg = ht ? 'rgba(245,195,59,0.14)' : 'rgba(255,77,109,0.16)';\n      badgeBorder = ht ? 'rgba(245,195,59,0.4)' : 'rgba(255,77,109,0.4)';\n      badgeDot = ht ? '#F5C33B' : '#FF4D6D';\n      badgeAnim = ht ? '' : 'animation:pulseDot 1.2s infinite;';\n      stateLine = ht ? 'Descanso' : (selMatch.min + ' · en juego');\n      stateColor = ht ? '#F5C33B' : '#FF4D6D';\n      ctaLabel = 'Ver en vivo';\n    } else if (isFinished) {\n      badgeLabel = 'FINALIZADO'; badgeColor = '#9aa3bd'; badgeBg = 'rgba(255,255,255,0.06)'; badgeBorder = 'rgba(255,255,255,0.14)'; badgeDot = '#8A92AD'; badgeAnim = '';\n      stateLine = 'Partido finalizado'; stateColor = '#8A92AD'; ctaLabel = 'Ver resumen';\n    } else {\n      badgeLabel = 'PRÓXIMO'; badgeColor = '#8FA9FF'; badgeBg = 'rgba(61,111,255,0.14)'; badgeBorder = 'rgba(61,111,255,0.35)'; badgeDot = '#3D6FFF'; badgeAnim = '';\n      stateLine = 'Comienza ' + selMatch.state; stateColor = '#8FA9FF'; ctaLabel = 'Recordarme';\n    }\n    const hero = {\n      badgeLabel, badgeColor, badgeBg, badgeBorder, badgeDot, badgeAnim, stateLine, stateColor, ctaLabel,\n      group: selMatch.group,\n      groupLine: 'Fase de Grupos · ' + selMatch.group,\n      scoreText: selMatch.score,\n      miniScoreLine: selMatch.home.code + ' ' + (selMatch.hs ?? '–') + ' – ' + (selMatch.as ?? '–') + ' ' + selMatch.away.code,\n      miniState: selMatch.stateMain,\n      home: { name: selMatch.home.name, code: selMatch.home.code, flag: selMatch.home.flag, goals: detail.homeGoals },\n      away: { name: selMatch.away.name, code: selMatch.away.code, flag: selMatch.away.flag, goals: detail.awayGoals },\n    };\n\n    // ---- mobile ----\n    const mobileSeg = this.state.mobileSeg;\n    const segDef = [['live', 'En vivo'], ['upcoming', 'Próximos'], ['all', 'Grupos']];\n    const mobileSegItems = segDef.map(([key, label]) => {\n      const active = mobileSeg === key;\n      return { label, active, bg: active ? gradA : 'transparent', color: active ? '#fff' : '#8A92AD', onClick: () => this.setMobileSeg(key) };\n    });\n    const mobileMatches = (mobileSeg === 'all' ? matchesWithMeta : matchesWithMeta.filter(m => m.cat === mobileSeg)).slice(0, 4);\n\n    const mobileNavDef = [\n      ['inicio', 'Inicio'], ['envivo', 'En vivo'], ['grupos', 'Grupos'], ['goleadores', 'Goles'], ['favoritos', 'Perfil'],\n    ];\n    const mobileNav = mobileNavDef.map(([key, label]) => {\n      const active = navView === key;\n      return { label, bg: active ? gradA : '#2a3350', color: active ? '#fff' : '#8A92AD', onClick: () => this.setNavView(key) };\n    });\n\n    const notifications = [\n      { text: '¡Gol de Messi! Argentina 1–0 Brasil', time: 'hace 55 min' },\n      { text: '¡Gol de Neymar! Argentina 1–1 Brasil', time: 'hace 33 min' },\n      { text: 'Francia 1–0 Alemania (55\\')', time: 'hace 23 min' },\n    ];\n\n    return {\n      tabs, filtered, noResults, matches: matchesWithMeta, mobileMatches, groups, groups2, scorers, events, stats, news, upcoming, nav,\n      query, onQueryChange: (e) => this.onQueryChange(e),\n      notifOpen: this.state.notifOpen, toggleNotif: (e) => this.toggleNotif(e), notifications,\n      hero, hasEvents, noEvents, hasStats, noStats,\n      showHero, showMatchList, showGroups, showLineups, showNews,\n      goGroups: () => this.setNavView('grupos'), goNews: () => this.setNavView('noticias'),\n      goLive: () => this.setNavView('envivo'), goScorers: () => this.setNavView('goleadores'),\n      mobileSeg: mobileSegItems, mobileNav,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
