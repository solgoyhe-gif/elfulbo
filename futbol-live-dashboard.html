<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fútbol Live — Dashboard Mundial 2026</title>
<meta name="theme-color" content="#05060B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════ TOKENS ═══════════════ */
  :root {
    --bg:        #05060B;
    --bg-app:    #0A0D1A;
    --bg-side:   #0B0F1F;
    --bg-card:   #12172B;
    --bg-inner:  #0f1426;
    --blue:      #3D6FFF;
    --violet:    #8B5CF6;
    --grad:      linear-gradient(135deg,#3D6FFF,#8B5CF6);
    --red:       #FF4D6D;
    --red-soft:  #FF7D95;
    --green:     #2FD98B;
    --gold:      #F5C33B;
    --text:      #EEF1F8;
    --text-sub:  #c3c9db;
    --muted:     #8A92AD;
    --dim:       #6a728c;
    --border:    rgba(255,255,255,0.06);
    --border-2:  rgba(255,255,255,0.08);
    --f-body:    'Archivo', system-ui, sans-serif;
    --f-head:    'Sora', system-ui, sans-serif;
    --f-mono:    'Space Grotesk', system-ui, sans-serif;
    --side-w:    236px;
    --rail-w:    322px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 800px at 20% 0%, #0d1024 0%, var(--bg) 60%) fixed;
    font-family: var(--f-body);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  a { text-decoration: none; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.8); } }
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ═══════════════ APP SHELL ═══════════════ */
  .app-shell { display: grid; grid-template-columns: var(--side-w) minmax(0,1fr); min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg-side);
    border-right: 1px solid var(--border);
    padding: 22px 16px;
    display: flex; flex-direction: column; gap: 22px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 12px; padding: 0 6px; }
  .brand-logo {
    width: 40px; height: 40px; border-radius: 12px; background: var(--grad);
    display: grid; place-items: center; font: 800 20px var(--f-mono); color: #fff; flex-shrink: 0;
  }
  .brand-name { font: 700 17px var(--f-head); letter-spacing: -.01em; }
  .brand-name span { color: var(--violet); }
  .brand-sub { font: 600 9px var(--f-mono); letter-spacing: .18em; color: var(--muted); }

  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: 11px; cursor: pointer; border: none; background: transparent;
    color: #9aa3bd; font: 600 13.5px var(--f-body); text-align: left; width: 100%;
    transition: background .15s, color .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .nav-item.active { background: var(--grad); color: #fff; }
  .nav-dot { width: 20px; height: 20px; border-radius: 6px; background: #2a3350; flex-shrink: 0; }
  .nav-item.active .nav-dot { background: rgba(255,255,255,0.35); }
  .nav-label { flex: 1; }
  .nav-badge { font: 700 10px var(--f-mono); color: #fff; padding: 2px 7px; border-radius: 20px; background: var(--violet); }
  .nav-badge.hot { background: var(--red); }

  .promo {
    margin-top: auto; border-radius: 16px; padding: 16px; background: linear-gradient(150deg,#3D6FFF,#8B5CF6);
    position: relative; overflow: hidden;
  }
  .promo::after { content: ""; position: absolute; right: -20px; top: -20px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.15); }
  .promo-badge { width: 34px; height: 34px; border-radius: 10px; background: rgba(255,255,255,0.25); display: grid; place-items: center; font: 800 16px var(--f-mono); color: #fff; }
  .promo-title { font: 700 15px var(--f-head); color: #fff; margin-top: 12px; line-height: 1.2; }
  .promo-meta { font: 500 11px var(--f-body); color: rgba(255,255,255,0.85); margin-top: 6px; }
  .promo-cta { margin-top: 14px; background: #fff; color: var(--blue); font: 700 12px var(--f-mono); text-align: center; padding: 9px; border-radius: 10px; }

  /* ── MAIN ── */
  .main { min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; gap: 16px; padding: 18px 26px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30;
    background: rgba(10,13,26,0.85); backdrop-filter: blur(12px);
  }
  .search {
    flex: 1; max-width: 420px; display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border-2); border-radius: 12px; padding: 11px 15px;
  }
  .search .ring { width: 14px; height: 14px; border: 2px solid var(--muted); border-radius: 50%; flex-shrink: 0; }
  .search input { flex: 1; background: transparent; border: none; outline: none; font: 400 13px var(--f-body); color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .pill { font: 600 12px var(--f-mono); color: var(--text); background: var(--bg-card); border: 1px solid var(--border-2); padding: 9px 13px; border-radius: 11px; white-space: nowrap; }
  .icon-btn { position: relative; width: 40px; height: 40px; border-radius: 11px; background: var(--bg-card); border: 1px solid var(--border-2); display: grid; place-items: center; cursor: pointer; }
  .icon-btn .bell { width: 14px; height: 16px; border: 2px solid var(--muted); border-radius: 6px 6px 0 0; border-bottom: none; }
  .icon-btn .dot { position: absolute; top: 7px; right: 9px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--bg-card); }
  .notif-pop {
    position: absolute; top: 48px; right: 0; width: 264px; background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    padding: 10px; z-index: 40; text-align: left;
  }
  .notif-head { font: 700 11px var(--f-mono); color: var(--muted); letter-spacing: .06em; text-transform: uppercase; padding: 6px 8px; }
  .notif-row { padding: 8px; border-radius: 9px; }
  .notif-row:hover { background: rgba(255,255,255,0.04); }
  .notif-row .t { font: 600 12px var(--f-body); color: var(--text); }
  .notif-row .s { font: 500 10px var(--f-body); color: var(--dim); margin-top: 2px; }
  .user { display: flex; align-items: center; gap: 9px; background: var(--bg-card); border: 1px solid var(--border-2); padding: 5px 12px 5px 5px; border-radius: 22px; }
  .user .av { width: 30px; height: 30px; border-radius: 50%; background: repeating-linear-gradient(45deg,#1f2740,#1f2740 5px,#182035 5px,#182035 10px); }
  .user .nm { font: 600 13px var(--f-body); color: var(--text); }

  .content { padding: 24px 26px 40px; display: grid; grid-template-columns: minmax(0,1fr) var(--rail-w); gap: 24px; align-items: start; }
  .col-left { display: flex; flex-direction: column; gap: 22px; min-width: 0; }
  .rail { display: flex; flex-direction: column; gap: 18px; }

  /* ── GENERIC CARD ── */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font: 600 12px var(--f-mono); letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .section-title { font: 700 15px var(--f-head); color: var(--text); }
  .link { font: 600 12px var(--f-body); color: var(--blue); cursor: pointer; background: none; border: none; }

  /* ── HERO ── */
  .hero { position: relative; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-2); padding: 22px 26px 26px;
    background: radial-gradient(600px 300px at 50% -10%, rgba(139,92,246,0.35), transparent 60%), linear-gradient(120deg,#141a33 0%,#101529 100%); }
  .hero-top { display: flex; align-items: center; justify-content: space-between; }
  .badge { display: flex; align-items: center; gap: 9px; padding: 6px 12px; border-radius: 20px; }
  .badge .bdot { width: 8px; height: 8px; border-radius: 50%; }
  .badge .blabel { font: 700 11px var(--f-mono); letter-spacing: .08em; }
  .hero-group { font: 600 12px var(--f-mono); color: #9aa3bd; letter-spacing: .03em; white-space: nowrap; }
  .hero-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; margin-top: 14px; }
  .hero-side { display: flex; align-items: center; gap: 18px; min-width: 0; }
  .hero-side.away { flex-direction: row-reverse; text-align: right; }
  .hero-photo { width: 110px; height: 140px; border-radius: 16px; flex-shrink: 0; position: relative; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px;
    background: repeating-linear-gradient(45deg,#1c2340,#1c2340 8px,#171d36 8px,#171d36 16px); }
  .hero-side.away .hero-photo { background: repeating-linear-gradient(-45deg,#1c2340,#1c2340 8px,#171d36 8px,#171d36 16px); }
  .hero-photo .flag { position: absolute; top: 8px; left: 8px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
  .hero-side.away .hero-photo .flag { left: auto; right: 8px; }
  .hero-photo .ph { font: 600 8px var(--f-mono); letter-spacing: .1em; color: #5a6488; }
  .hero-name { font: 700 24px var(--f-head); color: #fff; white-space: nowrap; }
  .hero-code { font: 500 12px var(--f-body); color: var(--muted); margin-top: 2px; white-space: nowrap; }
  .goal-chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .hero-side.away .goal-chips { justify-content: flex-end; }
  .goal-chip { font: 600 10px var(--f-mono); color: var(--green); background: rgba(47,217,139,0.12); padding: 3px 7px; border-radius: 6px; }
  .hero-center { text-align: center; }
  .hero-score { font: 700 52px var(--f-mono); color: #fff; line-height: 1; letter-spacing: .02em; white-space: nowrap; }
  .hero-state { font: 700 13px var(--f-mono); margin-top: 8px; }
  .hero-cta { margin-top: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--grad);
    padding: 11px 22px; border-radius: 12px; box-shadow: 0 10px 30px rgba(61,111,255,0.35); font: 700 13px var(--f-mono); color: #fff; cursor: pointer; border: none; white-space: nowrap; }
  .hero-cta .tri { width: 0; height: 0; border-left: 9px solid #fff; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }

  /* ── TIMELINE ── */
  .timeline { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
  .tl-item { display: flex; align-items: center; gap: 9px; background: var(--bg-inner); border: 1px solid rgba(255,255,255,0.05); padding: 9px 13px; border-radius: 11px; flex-shrink: 0; }
  .tl-mark { width: 16px; height: 16px; flex-shrink: 0; }
  .tl-min { font: 700 12px var(--f-mono); color: #fff; }
  .tl-min span { color: var(--muted); font-weight: 500; }
  .tl-label { font: 500 9.5px var(--f-body); color: var(--dim); }
  .empty { font: 500 12.5px var(--f-body); color: var(--dim); padding: 10px 2px; }

  /* ── MATCH LIST ── */
  .tabs { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { display: flex; align-items: center; gap: 7px; border: none; cursor: pointer; font: 600 12.5px var(--f-body); padding: 8px 14px; border-radius: 10px; background: transparent; color: var(--muted); }
  .tab.active { background: var(--grad); color: #fff; }
  .tab-count { font: 700 10px var(--f-mono); background: rgba(255,255,255,0.06); color: var(--muted); padding: 1px 7px; border-radius: 20px; }
  .tab.active .tab-count { background: rgba(255,255,255,0.25); color: #fff; }
  .tabs .date { margin-left: auto; font: 600 12px var(--f-mono); color: var(--muted); background: var(--bg-inner); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; }

  .matches { display: flex; flex-direction: column; gap: 6px; }
  .match {
    cursor: pointer; display: grid; grid-template-columns: 82px 1fr 92px 1fr 24px; align-items: center; gap: 12px;
    padding: 13px 12px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);
    transition: border-color .15s, background .15s;
  }
  .match:hover { border-color: rgba(255,255,255,0.12); }
  .match.live { background: rgba(255,77,109,0.05); border-color: rgba(255,77,109,0.18); }
  .match.selected { background: rgba(61,111,255,0.10); border-color: rgba(61,111,255,0.5); }
  .m-state { display: flex; align-items: center; gap: 6px; }
  .m-state .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .m-state .smain { font: 700 12px var(--f-mono); }
  .m-group { font: 500 10px var(--f-body); color: var(--dim); margin-top: 3px; }
  .m-team { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .m-team.home { justify-content: flex-end; }
  .m-team .nm { font: 600 14px var(--f-body); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .flag-dot { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }
  .m-score { text-align: center; font: 700 18px var(--f-mono); background: var(--bg-inner); border-radius: 9px; padding: 6px 0; }
  .m-star { cursor: pointer; font: 400 16px var(--f-body); text-align: center; }

  /* ── GROUPS ── */
  .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 15px; }
  .group-head { display: grid; grid-template-columns: 1fr 28px 28px; gap: 6px; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .group-name { font: 700 12px var(--f-mono); color: var(--violet); letter-spacing: .04em; }
  .group-h { font: 600 9px var(--f-mono); color: var(--dim); text-align: center; }
  .group-row { display: grid; grid-template-columns: 16px 22px 1fr 28px 28px; gap: 8px; align-items: center; padding: 5px 0; }
  .group-row .pos { font: 700 11px var(--f-mono); }
  .group-row .fl { width: 20px; height: 20px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.12); }
  .group-row .nm { font: 500 12px var(--f-body); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .group-row .pj { font: 500 12px var(--f-mono); color: var(--muted); text-align: center; }
  .group-row .pts { font: 700 12px var(--f-mono); color: #fff; text-align: center; }

  /* ── LINEUPS ── */
  .lineups { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .lu-head { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
  .lu-flag { width: 24px; height: 24px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }
  .lu-name { font: 700 14px var(--f-head); color: #fff; }
  .lu-form { margin-left: auto; font: 700 11px var(--f-mono); color: var(--blue); background: rgba(61,111,255,0.14); padding: 3px 9px; border-radius: 6px; }
  .lu-list { display: flex; flex-direction: column; gap: 2px; font: 500 12.5px var(--f-body); color: var(--text-sub); }
  .lu-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .lu-row:last-child { border-bottom: none; }
  .lu-row .p { color: var(--dim); }
  .cap { color: var(--gold); }

  /* ── NEWS ── */
  .news-list { display: flex; flex-direction: column; gap: 10px; }
  .news-row { display: flex; gap: 14px; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
  .news-thumb { width: 64px; height: 52px; border-radius: 10px; flex-shrink: 0; background: repeating-linear-gradient(45deg,#1c2340,#1c2340 7px,#171d36 7px,#171d36 14px); }
  .news-tag { font: 700 9px var(--f-mono); letter-spacing: .08em; padding: 2px 8px; border-radius: 5px; }
  .news-title { font: 600 13.5px var(--f-body); color: var(--text); margin-top: 7px; line-height: 1.35; }
  .news-time { font: 500 11px var(--f-body); color: var(--dim); white-space: nowrap; }

  /* ── RAIL WIDGETS ── */
  .live-mini { background: linear-gradient(150deg,#141a33,#101529); border: 1px solid var(--border-2); border-radius: 18px; padding: 18px; }
  .lm-teams { display: flex; align-items: center; justify-content: space-between; }
  .lm-team { text-align: center; flex: 1; }
  .lm-team .fl { width: 44px; height: 44px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); display: inline-block; }
  .lm-team .nm { font: 600 12px var(--f-body); color: var(--text); margin-top: 8px; }
  .lm-score { text-align: center; padding: 0 10px; }
  .lm-score .sc { font: 700 26px var(--f-mono); color: #fff; }
  .lm-score .st { font: 700 10px var(--f-mono); margin-top: 3px; background: rgba(255,77,109,0.14); padding: 3px 8px; border-radius: 20px; display: inline-block; }
  .lm-cta { margin-top: 16px; text-align: center; background: var(--grad); padding: 11px; border-radius: 12px; font: 700 13px var(--f-mono); color: #fff; cursor: pointer; }

  .spot { display: flex; gap: 14px; align-items: center; }
  .spot-img { width: 70px; height: 70px; border-radius: 16px; flex-shrink: 0; position: relative; background: repeating-linear-gradient(45deg,#1c2340,#1c2340 7px,#171d36 7px,#171d36 14px); }
  .spot-img .fl { position: absolute; bottom: -4px; right: -4px; width: 26px; height: 26px; border-radius: 50%; box-shadow: 0 0 0 2px var(--bg-card); }
  .spot-name { font: 700 18px var(--f-head); color: #fff; }
  .spot-meta { font: 500 12px var(--f-body); color: var(--muted); margin-top: 2px; }
  .spot-rating { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; background: rgba(245,195,59,0.14); padding: 4px 9px; border-radius: 7px; font: 700 11px var(--f-mono); color: var(--gold); }
  .spot-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 16px; }
  .spot-stat { background: var(--bg-inner); border-radius: 11px; padding: 11px 0; text-align: center; }
  .spot-stat .v { font: 700 20px var(--f-mono); color: #fff; }
  .spot-stat .l { font: 500 10px var(--f-body); color: var(--muted); margin-top: 2px; }
  .spot-cta { margin-top: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 11px; font: 700 12px var(--f-mono); color: var(--text-sub); cursor: pointer; }

  .stat-legend { display: flex; gap: 14px; font: 700 11px var(--f-mono); }
  .stats-list { display: flex; flex-direction: column; gap: 15px; }
  .stat-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .stat-row-top .v { font: 700 13px var(--f-mono); color: var(--text); }
  .stat-row-top .l { font: 500 11px var(--f-body); color: var(--muted); }
  .stat-bars { display: flex; gap: 5px; align-items: center; }
  .stat-track { flex: 1; height: 6px; background: var(--bg-inner); border-radius: 4px; overflow: hidden; display: flex; }
  .stat-track.home { justify-content: flex-end; }
  .stat-fill.home { height: 100%; background: var(--grad); border-radius: 4px; }
  .stat-fill.away { height: 100%; background: #3b445f; border-radius: 4px; }

  .scorers { display: flex; flex-direction: column; gap: 3px; }
  .scorer { display: grid; grid-template-columns: 20px 30px 1fr auto; gap: 11px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .scorer:last-child { border-bottom: none; }
  .scorer .rk { font: 700 13px var(--f-mono); }
  .scorer .av { width: 30px; height: 30px; border-radius: 50%; position: relative; background: repeating-linear-gradient(45deg,#1f2740,#1f2740 5px,#182035 5px,#182035 10px); }
  .scorer .av .fl { position: absolute; bottom: -2px; right: -2px; width: 15px; height: 15px; border-radius: 50%; box-shadow: 0 0 0 2px var(--bg-card); }
  .scorer .nm { font: 600 13px var(--f-body); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scorer .tm { font: 500 10px var(--f-body); color: var(--dim); }
  .scorer .g { display: flex; align-items: baseline; gap: 4px; }
  .scorer .g .n { font: 700 18px var(--f-mono); color: var(--violet); }
  .scorer .g .u { font: 500 9px var(--f-body); color: var(--dim); }

  .upcoming { display: flex; flex-direction: column; gap: 9px; }
  .up-row { display: flex; align-items: center; gap: 10px; }
  .up-time { font: 700 11px var(--f-mono); color: var(--text); background: var(--bg-inner); padding: 6px 9px; border-radius: 8px; white-space: nowrap; }
  .up-fl { width: 22px; height: 22px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.12); }
  .up-code { font: 600 12px var(--f-body); color: var(--text); }
  .up-vs { font: 500 11px var(--f-body); color: var(--dim); }

  /* ── BOTTOM NAV (mobile) ── */
  .bottom-nav { display: none; }

  /* ═══════════════ RESPONSIVE ═══════════════ */
  @media (max-width: 1100px) {
    .content { grid-template-columns: minmax(0,1fr); }
    .rail { display: grid; grid-template-columns: 1fr 1fr; }
    .rail .live-mini { grid-column: 1 / -1; }
  }
  @media (max-width: 760px) {
    .app-shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .content { padding: 16px 14px 96px; gap: 16px; }
    .topbar { padding: 14px 14px; }
    .pill, .user .nm { display: none; }
    .rail { grid-template-columns: 1fr; }
    .hero-grid { grid-template-columns: 1fr; gap: 16px; }
    .hero-side, .hero-side.away { flex-direction: column; text-align: center; }
    .hero-side.away .goal-chips { justify-content: center; }
    .hero-photo { width: 88px; height: 110px; }
    .hero-name { font-size: 20px; }
    .hero-score { font-size: 40px; }
    .lineups, .groups-grid { grid-template-columns: 1fr; }
    .match { grid-template-columns: 60px 1fr 70px 1fr 22px; gap: 8px; }
    .m-team .nm { font-size: 12px; }
    .bottom-nav {
      display: flex; justify-content: space-around; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      padding: 10px 12px 20px; background: rgba(11,15,31,0.94); backdrop-filter: blur(12px); border-top: 1px solid var(--border);
    }
    .bn-item { background: none; border: none; cursor: pointer; text-align: center; }
    .bn-dot { width: 22px; height: 22px; border-radius: 7px; background: #2a3350; margin: 0 auto; }
    .bn-item.active .bn-dot { background: var(--grad); }
    .bn-label { font: 600 9px var(--f-body); color: var(--muted); margin-top: 5px; }
    .bn-item.active .bn-label { color: #fff; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   FÚTBOL LIVE — Dashboard Mundial 2026 (versión web funcional)
   Datos de ejemplo. Renderizado con JS vanilla + estado central.
   ═══════════════════════════════════════════════════════════════ */

// ── Banderas (gradientes CSS) ──────────────────────────────────
const F = {
  ARG: 'linear-gradient(180deg,#75AADB 0 33%,#fff 33% 66%,#75AADB 66%)',
  BRA: 'radial-gradient(circle at 50% 55%, #FFDF00 26%, #009B3A 26%)',
  FRA: 'linear-gradient(90deg,#0055A4 33%,#fff 33% 66%,#EF4135 66%)',
  GER: 'linear-gradient(180deg,#141414 33%,#DD0000 33% 66%,#FFCE00 66%)',
  USA: 'linear-gradient(135deg,#3C3B6E 42%,#B22234 42%)',
  MEX: 'linear-gradient(90deg,#006847 33%,#fff 33% 66%,#CE1126 66%)',
  ESP: 'linear-gradient(180deg,#AA151B 25%,#F1BF00 25% 75%,#AA151B 75%)',
  ITA: 'linear-gradient(90deg,#008C45 33%,#fff 33% 66%,#CD212A 66%)',
  JPN: 'radial-gradient(circle,#BC002D 28%,#fff 28%)',
  CRO: 'linear-gradient(180deg,#FF0000 38%,#fff 38% 62%,#171796 62%)',
  RSA: 'linear-gradient(120deg,#007749 45%,#FFB915 45% 55%,#001489 55%)',
  KOR: 'radial-gradient(circle,#CD2E3A 30%,#0047A0 30% 44%,#fff 44%)',
  MAR: 'radial-gradient(circle,#006233 24%,#C1272D 24%)',
  SCO: 'linear-gradient(135deg,#0065BF 45%,#fff 45% 55%,#0065BF 55%)',
  NGA: 'linear-gradient(90deg,#008751 33%,#fff 33% 66%,#008751 66%)',
  AUS: 'linear-gradient(135deg,#00247D 55%,#fff 55% 62%,#E4002B 62%)',
  POL: 'linear-gradient(180deg,#fff 50%,#DC143C 50%)',
  ENG: 'linear-gradient(#CE1124,#CE1124) center/100% 26% no-repeat, linear-gradient(#CE1124,#CE1124) center/26% 100% no-repeat, #fff',
  POR: 'linear-gradient(90deg,#006600 40%,#FF0000 40%)',
  NED: 'linear-gradient(180deg,#AE1C28 33%,#fff 33% 66%,#21468B 66%)',
};
const GRAD = 'linear-gradient(135deg,#3D6FFF,#8B5CF6)';
const T = (code, name) => ({ code, name, flag: F[code] });

// ── Datos ──────────────────────────────────────────────────────
const MATCHES = [
  { cat: 'live',     state: 'LIVE', min: "78'",   group: 'Grupo C', home: T('ARG','Argentina'), away: T('BRA','Brasil'),    hs: 2,    as: 2 },
  { cat: 'live',     state: 'LIVE', min: "65'",   group: 'Grupo D', home: T('FRA','Francia'),   away: T('GER','Alemania'),  hs: 1,    as: 0 },
  { cat: 'live',     state: 'HT',   min: 'DESC.', group: 'Grupo A', home: T('USA','EE.UU.'),    away: T('MEX','México'),    hs: 0,    as: 0 },
  { cat: 'upcoming', state: '20:00',min: '',      group: 'Grupo B', home: T('ESP','España'),    away: T('ITA','Italia'),    hs: null, as: null },
  { cat: 'upcoming', state: '23:00',min: '',      group: 'Grupo C', home: T('JPN','Japón'),     away: T('CRO','Croacia'),   hs: null, as: null },
  { cat: 'finished', state: 'FT',   min: 'Final', group: 'Grupo A', home: T('RSA','Sudáfrica'), away: T('KOR','Corea'),     hs: 1,    as: 2 },
  { cat: 'finished', state: 'FT',   min: 'Final', group: 'Grupo B', home: T('MAR','Marruecos'), away: T('SCO','Escocia'),   hs: 2,    as: 0 },
];

const ev = (min, type, player) => {
  const map = {
    goal:   { bg: GRAD,      radius: '50%', label: 'Gol' },
    yellow: { bg: '#F5C33B', radius: '3px', label: 'T. Amarilla' },
    red:    { bg: '#FF4D6D', radius: '3px', label: 'T. Roja' },
    sub:    { bg: '#4D7CFF', radius: '50%', label: 'Cambio' },
  }[type];
  return { min, player, bg: map.bg, radius: map.radius, label: map.label };
};
const stat = (home, away, label, hpct, apct) => ({ home, away, label, hpct, apct });
const goal = (min, player) => ({ min, player });

const MATCH_DETAILS = {
  0: {
    events: [ev("23'",'goal','Messi'), ev("38'",'yellow','Casemiro'), ev("45'",'goal','Neymar'), ev("64'",'goal','Álvarez'), ev("77'",'goal','Vinícius'), ev("81'",'sub','Di María')],
    stats: [stat('52%','48%','Posesión',52,48), stat('14','11','Tiros',56,44), stat('5','4','A puerta',55,45), stat('4','3','Córners',57,43), stat('8','9','Faltas',47,53)],
    homeGoals: [goal("23'",'Messi'), goal("64'",'Álvarez')],
    awayGoals: [goal("45'",'Neymar'), goal("77'",'Vinícius')],
  },
  1: {
    events: [ev("12'",'yellow','Rüdiger'), ev("55'",'goal','Mbappé'), ev("60'",'sub','Musiala')],
    stats: [stat('47%','53%','Posesión',47,53), stat('9','13','Tiros',41,59), stat('4','6','A puerta',40,60), stat('3','5','Córners',38,62), stat('10','7','Faltas',59,41)],
    homeGoals: [goal("55'",'Mbappé')],
    awayGoals: [],
  },
  2: {
    events: [],
    stats: [stat('49%','51%','Posesión',49,51), stat('4','5','Tiros',44,56), stat('1','2','A puerta',40,60), stat('2','1','Córners',60,40), stat('3','4','Faltas',43,57)],
    homeGoals: [],
    awayGoals: [],
  },
};

const mkGroup = (name, rows) => ({
  name,
  teams: rows.map((r, i) => ({ pos: i + 1, posColor: i < 2 ? '#2FD98B' : '#6a728c', name: r[1], flag: F[r[0]], pj: r[2], pts: r[3] })),
});
const GROUPS = [
  mkGroup('Grupo A', [['MEX','México',2,4], ['USA','EE.UU.',2,4], ['RSA','Sudáfrica',2,3], ['KOR','Corea',2,0]]),
  mkGroup('Grupo B', [['ESP','España',2,6], ['ITA','Italia',2,3], ['MAR','Marruecos',2,3], ['SCO','Escocia',2,0]]),
  mkGroup('Grupo C', [['BRA','Brasil',2,6], ['ARG','Argentina',2,4], ['CRO','Croacia',2,1], ['JPN','Japón',2,1]]),
  mkGroup('Grupo D', [['FRA','Francia',2,6], ['GER','Alemania',2,3], ['NGA','Nigeria',2,3], ['AUS','Australia',2,0]]),
];

const SCORERS = [
  { rank: 1, name: 'K. Mbappé',     team: 'Francia',    flag: F.FRA, goals: 5 },
  { rank: 2, name: 'L. Messi',      team: 'Argentina',  flag: F.ARG, goals: 4 },
  { rank: 3, name: 'R. Lewandowski',team: 'Polonia',    flag: F.POL, goals: 4 },
  { rank: 4, name: 'Vinícius Jr',   team: 'Brasil',     flag: F.BRA, goals: 3 },
  { rank: 5, name: 'H. Kane',       team: 'Inglaterra', flag: F.ENG, goals: 3 },
].map(p => ({ ...p, rankColor: p.rank === 1 ? '#F5C33B' : (p.rank <= 3 ? '#8B5CF6' : '#6a728c') }));

const NEWS = [
  { tag: 'OFICIAL',   title: 'Publicado el calendario oficial del Mundial 2026', time: 'hace 2 h', tagColor: '#7C6BFF', tagBg: 'rgba(124,107,255,0.16)' },
  { tag: 'SELECCIÓN', title: 'Messi: "Venimos a defender nuestro título"',       time: 'hace 5 h', tagColor: '#2FD98B', tagBg: 'rgba(47,217,139,0.14)' },
  { tag: 'LESIÓN',    title: 'Francia recupera a Mbappé para los octavos',        time: 'hace 8 h', tagColor: '#FF4D6D', tagBg: 'rgba(255,77,109,0.14)' },
];

const UPCOMING = [
  { time: '20:00', home: T('ESP','España'),   away: T('ITA','Italia') },
  { time: '23:00', home: T('JPN','Japón'),    away: T('CRO','Croacia') },
  { time: 'Mañ.',  home: T('POR','Portugal'), away: T('NED','Países Bajos') },
];

const NOTIFS = [
  { text: '¡Gol de Messi! Argentina 1–0 Brasil',  time: 'hace 55 min' },
  { text: '¡Gol de Neymar! Argentina 1–1 Brasil',  time: 'hace 33 min' },
  { text: "Francia 1–0 Alemania (55')",            time: 'hace 23 min' },
];

const NAV_ITEMS = [
  { key: 'inicio',      label: 'Inicio' },
  { key: 'envivo',      label: 'En Vivo',      badge: 'live' },
  { key: 'proximos',    label: 'Próximos' },
  { key: 'mundial',     label: 'Mundial 2026', badge: 'HOT' },
  { key: 'grupos',      label: 'Grupos' },
  { key: 'equipos',     label: 'Equipos' },
  { key: 'jugadores',   label: 'Jugadores' },
  { key: 'goleadores',  label: 'Goleadores' },
  { key: 'noticias',    label: 'Noticias' },
  { key: 'estadisticas',label: 'Estadísticas' },
  { key: 'favoritos',   label: 'Favoritos' },
];
const MOBILE_NAV = [
  { key: 'inicio', label: 'Inicio' }, { key: 'envivo', label: 'En vivo' },
  { key: 'grupos', label: 'Grupos' }, { key: 'goleadores', label: 'Goles' },
  { key: 'favoritos', label: 'Perfil' },
];

const LINEUPS = [
  { name: 'Argentina', flag: 'linear-gradient(180deg,#75AADB 0 33%,#fff 33% 66%,#75AADB 66%)', form: '4-3-3',
    players: [['E. Martínez','POR'], ['N. Otamendi','DFC'], ['R. De Paul','MC'], ['L. Messi','DEL','C']] },
  { name: 'Brasil', flag: 'radial-gradient(circle at 50% 55%, #FFDF00 26%, #009B3A 26%)', form: '4-2-3-1',
    players: [['Alisson','POR'], ['Marquinhos','DFC'], ['Casemiro','MC'], ['Neymar Jr','DEL','C']] },
];

// ── Estado ─────────────────────────────────────────────────────
const state = { tab: 'all', navView: 'inicio', query: '', favorites: {}, selected: 0, notifOpen: false, _focusSearch: false };
const app = document.getElementById('app');
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const countCat = (c) => MATCHES.filter(m => m.cat === c).length;

// ── Derivados por partido ──────────────────────────────────────
function matchMeta(m, i) {
  const live = m.cat === 'live', ht = m.state === 'HT', fin = m.cat === 'finished';
  return {
    ...m, index: i, fav: !!state.favorites[i], selected: i === state.selected,
    stateMain: live ? (ht ? 'DESC.' : m.min) : m.state,
    stateColor: live ? (ht ? '#F5C33B' : '#FF4D6D') : (fin ? '#8A92AD' : '#7C8BB0'),
    dotAnim: m.state === 'LIVE' ? 'animation:pulseDot 1.2s infinite;' : '',
    score: m.hs == null ? 'VS' : (m.hs + ' – ' + m.as),
    scoreColor: m.hs == null ? '#7C8BB0' : '#fff',
    starColor: state.favorites[i] ? '#F5C33B' : (live ? '#7C8BB0' : '#3a445f'),
    rowClass: i === state.selected ? 'selected' : (live ? 'live' : ''),
  };
}

// ── Render de secciones ────────────────────────────────────────
function sidebar() {
  const items = NAV_ITEMS.map(n => {
    const active = state.navView === n.key;
    let badge = '';
    if (n.badge === 'HOT') badge = `<span class="nav-badge hot">HOT</span>`;
    else if (n.badge === 'live') badge = `<span class="nav-badge">${countCat('live')}</span>`;
    return `<button class="nav-item ${active ? 'active' : ''}" data-action="nav" data-view="${n.key}">
      <span class="nav-dot"></span><span class="nav-label">${esc(n.label)}</span>${badge}</button>`;
  }).join('');
  return `<aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">F</div>
      <div><div class="brand-name">Fútbol<span>Live</span></div><div class="brand-sub">MUNDIAL 2026</div></div>
    </div>
    <nav class="nav">${items}</nav>
    <div class="promo">
      <div class="promo-badge">26</div>
      <div class="promo-title">Copa Mundial<br>FIFA 2026</div>
      <div class="promo-meta">11 jun – 19 jul · USA · CAN · MEX</div>
      <div class="promo-cta">Ver detalles →</div>
    </div>
  </aside>`;
}

function topbar() {
  const pop = state.notifOpen ? `<div class="notif-pop">
    <div class="notif-head">Notificaciones</div>
    ${NOTIFS.map(n => `<div class="notif-row"><div class="t">${esc(n.text)}</div><div class="s">${esc(n.time)}</div></div>`).join('')}
  </div>` : '';
  return `<header class="topbar">
    <div class="search">
      <span class="ring"></span>
      <input id="search" type="text" value="${esc(state.query)}" placeholder="Buscar equipos, jugadores, partidos…">
    </div>
    <div class="topbar-right">
      <div class="pill">12 jun 2026</div>
      <div class="icon-btn" data-action="notif" data-notif-root>
        <span class="bell"></span><span class="dot"></span>${pop}
      </div>
      <div class="user"><span class="av"></span><span class="nm">Carlos M.</span></div>
    </div>
  </header>`;
}

function heroCard(sel) {
  const detail = MATCH_DETAILS[state.selected] || { homeGoals: [], awayGoals: [] };
  const live = sel.cat === 'live', ht = sel.state === 'HT', fin = sel.cat === 'finished';
  let bLabel, bColor, bBg, bBorder, bDot, bAnim, stateLine, stateColor, cta;
  if (live) {
    bLabel = ht ? 'DESCANSO' : 'EN VIVO'; bColor = ht ? '#F5C33B' : '#FF7D95';
    bBg = ht ? 'rgba(245,195,59,0.14)' : 'rgba(255,77,109,0.16)'; bBorder = ht ? 'rgba(245,195,59,0.4)' : 'rgba(255,77,109,0.4)';
    bDot = ht ? '#F5C33B' : '#FF4D6D'; bAnim = ht ? '' : 'animation:pulseDot 1.2s infinite;';
    stateLine = ht ? 'Descanso' : (sel.min + ' · en juego'); stateColor = ht ? '#F5C33B' : '#FF4D6D'; cta = 'Ver en vivo';
  } else if (fin) {
    bLabel = 'FINALIZADO'; bColor = '#9aa3bd'; bBg = 'rgba(255,255,255,0.06)'; bBorder = 'rgba(255,255,255,0.14)'; bDot = '#8A92AD'; bAnim = '';
    stateLine = 'Partido finalizado'; stateColor = '#8A92AD'; cta = 'Ver resumen';
  } else {
    bLabel = 'PRÓXIMO'; bColor = '#8FA9FF'; bBg = 'rgba(61,111,255,0.14)'; bBorder = 'rgba(61,111,255,0.35)'; bDot = '#3D6FFF'; bAnim = '';
    stateLine = 'Comienza ' + sel.state; stateColor = '#8FA9FF'; cta = 'Recordarme';
  }
  const chip = g => `<span class="goal-chip">${esc(g.min)} ${esc(g.player)}</span>`;
  const side = (team, goals, away) => `<div class="hero-side ${away ? 'away' : ''}">
    <div class="hero-photo"><span class="flag" style="background:${team.flag}"></span><span class="ph">FOTO</span></div>
    <div style="min-width:0"><div class="hero-name">${esc(team.name)}</div>
      <div class="hero-code">${esc(team.code)} · ${esc(sel.group)}</div>
      <div class="goal-chips">${goals.map(chip).join('')}</div></div></div>`;
  return `<div class="hero fade-in">
    <div class="hero-top">
      <div class="badge" style="background:${bBg};border:1px solid ${bBorder}">
        <span class="bdot" style="background:${bDot};${bAnim}"></span>
        <span class="blabel" style="color:${bColor}">${bLabel}</span>
      </div>
      <span class="hero-group">Fase de Grupos · ${esc(sel.group)}</span>
    </div>
    <div class="hero-grid">
      ${side(sel.home, detail.homeGoals, false)}
      <div class="hero-center">
        <div class="hero-score">${esc(sel.score)}</div>
        <div class="hero-state" style="color:${stateColor}">${stateLine}</div>
        <button class="hero-cta"><span class="tri"></span>${cta}</button>
      </div>
      ${side(sel.away, detail.awayGoals, true)}
    </div>
  </div>`;
}

function timelineCard(sel) {
  const detail = MATCH_DETAILS[state.selected] || { events: [] };
  const events = detail.events || [];
  const body = events.length
    ? `<div class="timeline">${events.map(e => `<div class="tl-item">
        <span class="tl-mark" style="background:${e.bg};border-radius:${e.radius}"></span>
        <div><div class="tl-min">${esc(e.min)} <span>${esc(e.player)}</span></div>
        <div class="tl-label">${esc(e.label)}</div></div></div>`).join('')}</div>`
    : `<div class="empty">Aún no hay eventos registrados para este partido.</div>`;
  const line = sel.home.code + ' ' + (sel.hs ?? '–') + ' – ' + (sel.as ?? '–') + ' ' + sel.away.code;
  return `<div class="card">
    <div class="card-head"><span class="card-title">Cronología del partido</span><span class="link" style="cursor:default">${esc(line)}</span></div>
    ${body}
  </div>`;
}

function matchListCard() {
  const tabsDef = [['all','Todos',MATCHES.length], ['live','En vivo',countCat('live')], ['upcoming','Próximos',countCat('upcoming')], ['finished','Finalizados',countCat('finished')]];
  const tabs = tabsDef.map(([key,label,c]) => `<button class="tab ${state.tab===key?'active':''}" data-action="tab" data-tab="${key}">
    ${esc(label)}<span class="tab-count">${c}</span></button>`).join('');

  let list = MATCHES.map(matchMeta);
  if (state.navView === 'favoritos') list = list.filter(m => m.fav);
  if (state.tab !== 'all') list = list.filter(m => m.cat === state.tab);
  const q = state.query.trim().toLowerCase();
  if (q) list = list.filter(m => (m.home.name + ' ' + m.away.name).toLowerCase().includes(q));

  const rows = list.length ? list.map(m => `<div class="match ${m.rowClass}" data-action="select" data-idx="${m.index}">
      <div><div class="m-state"><span class="sdot" style="background:${m.stateColor};${m.dotAnim}"></span>
        <span class="smain" style="color:${m.stateColor}">${esc(m.stateMain)}</span></div>
        <div class="m-group">${esc(m.group)}</div></div>
      <div class="m-team home"><span class="nm">${esc(m.home.name)}</span><span class="flag-dot" style="background:${m.home.flag}"></span></div>
      <div class="m-score" style="color:${m.scoreColor}">${esc(m.score)}</div>
      <div class="m-team"><span class="flag-dot" style="background:${m.away.flag}"></span><span class="nm">${esc(m.away.name)}</span></div>
      <span class="m-star" data-action="fav" data-idx="${m.index}" style="color:${m.starColor}">★</span>
    </div>`).join('')
    : `<div class="empty" style="text-align:center;padding:16px 4px">No se encontraron partidos.</div>`;

  return `<div class="card">
    <div class="tabs">${tabs}<div class="date">12 jun ▾</div></div>
    <div class="matches">${rows}</div>
  </div>`;
}

function groupsSection() {
  const cards = GROUPS.map(g => `<div class="group-card">
    <div class="group-head"><span class="group-name">${esc(g.name)}</span><span class="group-h">PJ</span><span class="group-h">PTS</span></div>
    ${g.teams.map(t => `<div class="group-row">
      <span class="pos" style="color:${t.posColor}">${t.pos}</span>
      <span class="fl" style="background:${t.flag}"></span>
      <span class="nm">${esc(t.name)}</span>
      <span class="pj">${t.pj}</span><span class="pts">${t.pts}</span></div>`).join('')}
  </div>`).join('');
  return `<div class="fade-in">
    <div class="card-head"><span class="section-title">Vista de Grupos</span><button class="link" data-action="nav" data-view="grupos">Ver todos los grupos →</button></div>
    <div class="groups-grid">${cards}</div>
  </div>`;
}

function lineupsCard() {
  const col = (lu) => `<div><div class="lu-head">
    <span class="lu-flag" style="background:${lu.flag}"></span>
    <span class="lu-name">${esc(lu.name)}</span><span class="lu-form">${lu.form}</span></div>
    <div class="lu-list">${lu.players.map(p => `<div class="lu-row"><span>${esc(p[0])}${p[2] ? ' <span class="cap">(C)</span>' : ''}</span><span class="p">${p[1]}</span></div>`).join('')}</div></div>`;
  return `<div class="card">
    <div class="card-head"><span class="card-title">Alineaciones</span><span class="card-title" style="text-transform:none;letter-spacing:0">Titulares</span></div>
    <div class="lineups">${col(LINEUPS[0])}${col(LINEUPS[1])}</div>
  </div>`;
}

function newsSection() {
  const rows = NEWS.map(n => `<div class="news-row">
    <div class="news-thumb"></div>
    <div style="flex:1;min-width:0">
      <span class="news-tag" style="color:${n.tagColor};background:${n.tagBg}">${esc(n.tag)}</span>
      <div class="news-title">${esc(n.title)}</div></div>
    <span class="news-time">${esc(n.time)}</span></div>`).join('');
  return `<div class="fade-in">
    <div class="card-head"><span class="section-title">Noticias y Actualizaciones</span><button class="link" data-action="nav" data-view="noticias">Ver todas →</button></div>
    <div class="news-list">${rows}</div>
  </div>`;
}

function rail(sel) {
  const detail = MATCH_DETAILS[state.selected] || { stats: null };
  const liveMini = `<div class="live-mini">
    <div class="card-head"><span class="card-title">Partido en vivo</span><button class="link" data-action="nav" data-view="envivo">Ver todos</button></div>
    <div class="lm-teams">
      <div class="lm-team"><span class="fl" style="background:${sel.home.flag}"></span><div class="nm">${esc(sel.home.name)}</div></div>
      <div class="lm-score"><div class="sc">${esc(sel.score)}</div><div class="st" style="color:${sel.stateColor}">${esc(sel.stateMain)}</div></div>
      <div class="lm-team"><span class="fl" style="background:${sel.away.flag}"></span><div class="nm">${esc(sel.away.name)}</div></div>
    </div>
    <div class="lm-cta">Match Center →</div>
  </div>`;

  const spotlight = `<div class="card">
    <div class="card-head"><span class="card-title">Jugador destacado</span></div>
    <div class="spot">
      <div class="spot-img"><span class="fl" style="background:${F.ARG}"></span></div>
      <div><div class="spot-name">Lionel Messi</div>
        <div class="spot-meta">Argentina · Delantero · #10</div>
        <div class="spot-rating">★ 8.9</div></div>
    </div>
    <div class="spot-stats">
      <div class="spot-stat"><div class="v">5</div><div class="l">Goles</div></div>
      <div class="spot-stat"><div class="v">3</div><div class="l">Asist.</div></div>
      <div class="spot-stat"><div class="v">4</div><div class="l">Partidos</div></div>
    </div>
    <div class="spot-cta">Ver perfil completo →</div>
  </div>`;

  const stats = detail.stats;
  const statsBody = stats ? stats.map(s => `<div>
    <div class="stat-row-top"><span class="v">${esc(s.home)}</span><span class="l">${esc(s.label)}</span><span class="v">${esc(s.away)}</span></div>
    <div class="stat-bars">
      <div class="stat-track home"><div class="stat-fill home" style="width:${s.hpct}%"></div></div>
      <div class="stat-track"><div class="stat-fill away" style="width:${s.apct}%"></div></div>
    </div></div>`).join('')
    : `<div class="empty">Sin estadísticas disponibles para este partido.</div>`;
  const statsCard = `<div class="card">
    <div class="card-head"><span class="card-title">Estadísticas</span>
      <div class="stat-legend"><span style="color:#3D6FFF">${esc(sel.home.code)}</span><span style="color:#8A92AD">${esc(sel.away.code)}</span></div></div>
    <div class="stats-list">${statsBody}</div>
  </div>`;

  const scorersCard = `<div class="card">
    <div class="card-head"><span class="card-title">Máximos goleadores</span><button class="link" data-action="nav" data-view="goleadores">Ver todos</button></div>
    <div class="scorers">${SCORERS.map(p => `<div class="scorer">
      <span class="rk" style="color:${p.rankColor}">${p.rank}</span>
      <span class="av"><span class="fl" style="background:${p.flag}"></span></span>
      <div style="min-width:0"><div class="nm">${esc(p.name)}</div><div class="tm">${esc(p.team)}</div></div>
      <div class="g"><span class="n">${p.goals}</span><span class="u">gol</span></div></div>`).join('')}</div>
  </div>`;

  const upcomingCard = `<div class="card">
    <div class="card-head"><span class="card-title">Próximos partidos</span></div>
    <div class="upcoming">${UPCOMING.map(u => `<div class="up-row">
      <span class="up-time">${esc(u.time)}</span>
      <span class="up-fl" style="background:${u.home.flag}"></span><span class="up-code">${esc(u.home.code)}</span>
      <span class="up-vs">vs</span>
      <span class="up-code">${esc(u.away.code)}</span><span class="up-fl" style="background:${u.away.flag}"></span></div>`).join('')}</div>
  </div>`;

  return `<div class="rail">${liveMini}${spotlight}${statsCard}${scorersCard}${upcomingCard}</div>`;
}

function bottomNav() {
  return `<nav class="bottom-nav">${MOBILE_NAV.map(n => `<button class="bn-item ${state.navView===n.key?'active':''}" data-action="nav" data-view="${n.key}">
    <div class="bn-dot"></div><div class="bn-label">${esc(n.label)}</div></button>`).join('')}</nav>`;
}

// ── Render principal ───────────────────────────────────────────
function render() {
  const nv = state.navView;
  const sel = matchMeta(MATCHES[state.selected], state.selected);

  const showHero      = ['inicio','mundial','estadisticas','envivo','favoritos','proximos'].includes(nv);
  const showMatchList = !['grupos','noticias','goleadores','jugadores'].includes(nv);
  const showGroups    = ['inicio','mundial','grupos','equipos'].includes(nv);
  const showLineups   = (nv === 'inicio' || nv === 'mundial') && state.selected === 0;
  const showNews      = ['inicio','mundial','noticias'].includes(nv);

  const left = [
    showHero      ? heroCard(sel)       : '',
    showHero      ? timelineCard(sel)   : '',
    showMatchList ? matchListCard()     : '',
    showGroups    ? groupsSection()     : '',
    showLineups   ? lineupsCard()       : '',
    showNews      ? newsSection()       : '',
  ].join('');

  app.innerHTML = `<div class="app-shell">
    ${sidebar()}
    <div class="main">
      ${topbar()}
      <div class="content">
        <div class="col-left">${left}</div>
        ${rail(sel)}
      </div>
    </div>
  </div>${bottomNav()}`;

  if (state._focusSearch) {
    const inp = document.getElementById('search');
    if (inp) { inp.focus(); const v = inp.value; inp.value = ''; inp.value = v; }
    state._focusSearch = false;
  }
}

// ── Eventos (delegación) ───────────────────────────────────────
app.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action;
  if (a === 'nav')      { state.navView = el.dataset.view; state.notifOpen = false; render(); }
  else if (a === 'tab') { state.tab = el.dataset.tab; render(); }
  else if (a === 'select') { state.selected = +el.dataset.idx; render(); }
  else if (a === 'fav') { e.stopPropagation(); const i = +el.dataset.idx; state.favorites[i] = !state.favorites[i]; render(); }
  else if (a === 'notif') { e.stopPropagation(); state.notifOpen = !state.notifOpen; render(); }
});
app.addEventListener('input', (e) => {
  if (e.target.id === 'search') { state.query = e.target.value; state._focusSearch = true; render(); }
});
// Cerrar el popup de notificaciones al hacer clic fuera
document.addEventListener('click', (e) => {
  if (state.notifOpen && !e.target.closest('[data-notif-root]')) { state.notifOpen = false; render(); }
});
// Delegación para la nav inferior (fuera de #app)
document.addEventListener('click', (e) => {
  const el = e.target.closest('.bottom-nav [data-action="nav"]');
  if (el) { state.navView = el.dataset.view; state.notifOpen = false; render(); }
});

render();
</script>
</body>
</html>
