<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>El Fulbo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="top-bar">
        <div id="app-logo">El Fulbo</div>
        <div id="top-bar-right">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">⚙️</button>
        </div>
    </header>

    <main id="app-container">
        <div id="data-display">
            </div>
    </main>

    <nav id="main-nav">
        <button class="nav-item active" data-view="leagues">
            <span>🏆</span><span>Ligas</span>
        </button>
        <button class="nav-item" data-view="live">
            <span>⏱️</span><span>En Vivo</span>
        </button>
        <button class="nav-item" data-view="lineups">
            <span>📋</span><span>Alineaciones</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
